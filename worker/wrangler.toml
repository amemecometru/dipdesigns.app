name = "webhooks-email"
main = "index.js"
compatibility_date = "2026-06-11"

[placement]
mode = "smart"

[assets]
directory = "./assets"

[[kv_namespaces]]
binding = "WEBHOOKS_KV"
id = "5b35c96a0bdd418685bfb6ce68884acd"

[[durable_objects.bindings]]
name = "SESSION_HUB"
class_name = "SessionHub"

[[durable_objects.bindings]]
name = "CREDIT_LEDGER"
class_name = "CreditLedger"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["SessionHub"]

[[migrations]]
tag = "v2"
new_sqlite_classes = ["CreditLedger"]

[vars]
CREDIT_COST = "1"
FREE_DAILY_LIMIT = "3"

[env.production]
vars = { ENVIRONMENT = "production" }
