<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>webhooks.email</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0f0f1a">
  <meta name="description" content="Vibe-code anything. Email or webhook a prompt, get a live rendered UI.">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f0f1a;
      --surface: #1a1a2e;
      --surface2: #232342;
      --accent: #7c5cfc;
      --accent-glow: rgba(124, 92, 252, 0.3);
      --text: #e0e0f0;
      --text-dim: #7a7a9a;
      --border: #2a2a4a;
      --success: #34d399;
      --error: #f87171;
      --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
      --radius: 12px;
      --shadow: 0 4px 24px rgba(0,0,0,0.4);
    }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font); }
    body { display: flex; flex-direction: column; }
    header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 24px; background: var(--surface); border-bottom: 1px solid var(--border);
      -webkit-app-region: drag;
    }
    header h1 { font-size: 18px; font-weight: 600; letter-spacing: -0.3px; }
    header h1 span { color: var(--accent); }
    header .status { font-size: 13px; color: var(--text-dim); display: flex; align-items: center; gap: 6px; }
    header .status .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--success); display: inline-block; }
    .container { display: flex; flex: 1; overflow: hidden; }
    .panel-chat {
      width: 420px; min-width: 320px; display: flex; flex-direction: column;
      border-right: 1px solid var(--border); background: var(--surface);
    }
    .messages {
      flex: 1; overflow-y: auto; padding: 16px;
      display: flex; flex-direction: column; gap: 12px;
    }
    .messages::-webkit-scrollbar { width: 6px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    .msg { padding: 10px 14px; border-radius: var(--radius); font-size: 14px; line-height: 1.5; max-width: 90%; animation: fadeIn 0.2s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
    .msg.user { background: var(--accent); color: #fff; align-self: flex-end; border-bottom-right-radius: 4px; }
    .msg.assistant { background: var(--surface2); color: var(--text); align-self: flex-start; border-bottom-left-radius: 4px; }
    .msg.error { background: rgba(248, 113, 113, 0.15); color: var(--error); align-self: flex-start; border-left: 3px solid var(--error); }
    .msg.typing { color: var(--text-dim); font-style: italic; }
    .input-area {
      padding: 12px 16px; border-top: 1px solid var(--border);
      display: flex; gap: 8px; align-items: flex-end;
    }
    .input-area textarea {
      flex: 1; background: var(--surface2); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 10px 14px; color: var(--text);
      font-family: var(--font); font-size: 14px; resize: none; min-height: 44px; max-height: 120px;
      outline: none; transition: border-color 0.2s;
    }
    .input-area textarea:focus { border-color: var(--accent); }
    .input-area button {
      background: var(--accent); color: #fff; border: none; border-radius: var(--radius);
      width: 44px; height: 44px; cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: background 0.2s, box-shadow 0.2s; flex-shrink: 0;
    }
    .input-area button:hover { background: #6a4ae8; box-shadow: 0 0 20px var(--accent-glow); }
    .input-area button:disabled { opacity: 0.5; cursor: not-allowed; }
    .input-area button svg { width: 20px; height: 20px; fill: currentColor; }
    .panel-preview { flex: 1; display: flex; flex-direction: column; background: var(--bg); }
    .panel-preview .toolbar {
      padding: 8px 16px; background: var(--surface); border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 12px; font-size: 13px; color: var(--text-dim);
    }
    .panel-preview .toolbar .device-btn {
      background: none; border: 1px solid var(--border); color: var(--text-dim);
      padding: 4px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; transition: all 0.2s;
    }
    .panel-preview .toolbar .device-btn:hover { border-color: var(--accent); color: var(--text); }
    .panel-preview .toolbar .device-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
    .panel-preview .toolbar .clear-btn {
      margin-left: auto; background: none; border: none; color: var(--error);
      cursor: pointer; font-size: 12px; opacity: 0.6; transition: opacity 0.2s;
    }
    .panel-preview .toolbar .clear-btn:hover { opacity: 1; }
    iframe#preview {
      flex: 1; width: 100%; border: none; background: #fff;
      transition: max-width 0.3s ease;
    }
    iframe#preview.mobile { max-width: 375px; margin: 0 auto; border-left: 1px solid var(--border); border-right: 1px solid var(--border); }
    @media (max-width: 768px) {
      .container { flex-direction: column; }
      .panel-chat { width: 100%; min-width: 0; max-height: 50vh; border-right: none; border-bottom: 1px solid var(--border); }
      .panel-preview { flex: 1; }
    }
  </style>
</head>
<body>
  <header>
    <h1>webhooks.<span>email</span></h1>
    <div class="status">
      <span class="dot"></span> Gemma-4 Ready
    </div>
  </header>

  <div class="container">
    <div class="panel-chat">
      <div class="messages" id="messages">
        <div class="msg assistant">Hi! Describe the UI you want to build — I'll generate it live on the right.</div>
      </div>
      <div class="input-area">
        <textarea id="promptInput" rows="1" placeholder="Describe your UI… (e.g. 'a dark dashboard with a sidebar and a chart')" enterkeyhint="send"></textarea>
        <button id="sendBtn" title="Send">
          <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
      </div>
    </div>
    <div class="panel-preview">
      <div class="toolbar">
        <span>Preview</span>
        <button class="device-btn active" data-device="desktop">Desktop</button>
        <button class="device-btn" data-device="mobile">Mobile</button>
        <button class="clear-btn" id="sendDesktopBtn" style="display:none;background:none;border:1px solid var(--success);color:var(--success);padding:4px 12px;border-radius:6px;cursor:pointer;font-size:12px;">Send to Desktop</button>
        <button class="clear-btn" id="webhookerBtn" style="display:none;background:none;border:1px solid var(--accent);color:var(--accent);padding:4px 12px;border-radius:6px;cursor:pointer;font-size:12px;">Webhook</button>
        <button class="clear-btn" id="clearPreviewBtn">Clear</button>
      </div>
      <iframe id="preview" sandbox="allow-scripts allow-same-origin" title="Live Preview"></iframe>
    </div>
  </div>

  <script src="client.js"></script>
</body>
</html>
